name: Build and Release SuplaDeviceGUI

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        env:
          - ESP8266
          - ESP32
          - ESP32C3
          - ESP32S2
          - ESP32S3

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ${{ matrix.env }}
        run: |
          case "${{ matrix.env }}" in
            ESP8266) pio run -e SuplaDevice_ESP8266 ;;
            ESP32)   pio run -e SuplaDevice_ESP32 ;;
            ESP32C3) pio run -e SuplaDevice_ESP32C3 ;;
            ESP32S2) pio run -e SuplaDevice_ESP32S2 ;;
            ESP32S3) pio run -e SuplaDevice_ESP32S3 ;;
          esac

      - name: Copy firmware binaries
        run: |
          mkdir -p release
          case "${{ matrix.env }}" in
            ESP8266) cp .pio/build/SuplaDevice_ESP8266/firmware.bin release/SuplaDevice_ESP8266.bin ;;
            ESP32)   cp .pio/build/SuplaDevice_ESP32/firmware.bin release/SuplaDevice_ESP32.bin ;;
            ESP32C3) cp .pio/build/SuplaDevice_ESP32C3/firmware.bin release/SuplaDevice_ESP32C3.bin ;;
            ESP32S2) cp .pio/build/SuplaDevice_ESP32S2/firmware.bin release/SuplaDevice_ESP32S2.bin ;;
            ESP32S3) cp .pio/build/SuplaDevice_ESP32S3/firmware.bin release/SuplaDevice_ESP32S3.bin ;;
          esac

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.env }}-bin
          path: release/*.bin


  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Generate version from PlatformIO
        run: |
          VERSION=$(grep -m1 BUILD_VERSION platformio.ini | sed -E 's/.*BUILD_VERSION=.*"([^"]+)".*/\1/')
          echo "VERSION=v$VERSION" >> $GITHUB_ENV
          echo "Using version v$VERSION"

      - name: List release files
        run: ls -R release

      # 🚀 Release versioned
      - name: Upload versioned release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: SuplaDeviceGUI ${{ env.VERSION }}
          token: ${{ secrets.GITHUB_TOKEN }}
          files: release/**/*.bin

      # 🔁 Delete old latest
      - name: Delete old latest
        uses: dev-drprasad/delete-tag-and-release@v1.0
        continue-on-error: true
        with:
          tag_name: latest
          delete_release: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # 🚀 Upload latest
      - name: Upload latest
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: SuplaDeviceGUI latest
          token: ${{ secrets.GITHUB_TOKEN }}
          files: release/**/*.bin