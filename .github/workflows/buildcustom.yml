      SUPLA_DIRECT_LINKS_MULTI_SENSOR:
        type: boolean
        default: false
      SUPLA_WAKE_ON_LAN:
        type: boolean
        default: false
      SUPLA_MODBUS_SDM:
        type: boolean
        default: false
      SUPLA_MODBUS_SDM_ONE_PHASE:
        type: boolean
        default: false
      SUPLA_MODBUS_SDM_72_V2:
        type: boolean
        default: false
      SUPLA_MS5611:
        type: boolean
        default: false
      SUPLA_BONEIO_32x10A:
        type: boolean
        default: false
      SUPLA_BONEIO_24x16A:
        type: boolean
        default: false
      SUPLA_THERMOSTAT:
        type: boolean
        default: false
      SUPLA_CC1101:
        type: boolean
        default: false
      SUPLA_AHTX0:
        type: boolean
        default: false
      SUPLA_DISABLE_LOGS:
        type: boolean
        default: false
      SUPLA_SPS30_KPOP:
        type: boolean
        default: false
      SUPLA_INCREASE_LIMIT:
        type: boolean
        default: false
      SUPLA_INA219:
        type: boolean
        default: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install platformio

      - name: Prepare flags
        run: |
          FLAGS=""

          for FLAG in SUPLA_RELAY SUPLA_BUTTON SUPLA_ACTION_TRIGGER SUPLA_LIMIT_SWITCH \
          SUPLA_ROLLERSHUTTER SUPLA_DS18B20 SUPLA_DHT11 SUPLA_DHT22 SUPLA_SI7021_SONOFF \
          SUPLA_BME280 SUPLA_SHT3x SUPLA_SI7021 SUPLA_MAX6675 SUPLA_HC_SR04 SUPLA_IMPULSE_COUNTER \
          SUPLA_OLED SUPLA_HLW8012 SUPLA_MCP23017 SUPLA_RGBW SUPLA_PUSHOVER SUPLA_DIRECT_LINKS \
          SUPLA_LED SUPLA_NTC_10K SUPLA_PZEM_V_3 SUPLA_PZEM_ADR SUPLA_BMP280 SUPLA_CSE7766 \
          SUPLA_DEEP_SLEEP SUPLA_MPX_5XXX SUPLA_VL53L0X SUPLA_DIRECT_LINKS_SENSOR_THERMOMETR \
          SUPLA_CONDITIONS SUPLA_RF_BRIDGE SUPLA_HDC1080 SUPLA_LCD_HD44780 SUPLA_MAX31855 \
          SUPLA_ANALOG_READING_KPOP SUPLA_MAX44009_KPOP SUPLA_BH1750_KPOP SUPLA_VINDRIKTNING_IKEA_KPOP \
          SUPLA_PMSX003_KPOP SUPLA_WT32_ETH01_LAN8720 SUPLA_ETH01_LAN8720 SUPLA_ADE7953 \
          SUPLA_PCF8575 SUPLA_SHT_AUTODETECT SUPLA_PCF8574 SUPLA_DIRECT_LINKS_MULTI_SENSOR \
          SUPLA_WAKE_ON_LAN SUPLA_MODBUS_SDM SUPLA_MODBUS_SDM_ONE_PHASE SUPLA_MODBUS_SDM_72_V2 \
          SUPLA_MS5611 SUPLA_BONEIO_32x10A SUPLA_BONEIO_24x16A SUPLA_THERMOSTAT SUPLA_CC1101 \
          SUPLA_AHTX0 SUPLA_DISABLE_LOGS SUPLA_SPS30_KPOP SUPLA_INCREASE_LIMIT SUPLA_INA219
          do
            if [ "${{ inputs[$FLAG] }}" = "true" ]; then
              FLAGS="$FLAGS -D $FLAG"
            fi
          done

          echo "FLAGS=$FLAGS"
          echo "FLAGS=$FLAGS" >> $GITHUB_ENV

      - name: Build
        run: |
          echo "Extra flags: $FLAGS"

          pio run \
            -e ${{ inputs.environment }} \
            --project-option="build_flags=${FLAGS}"

      - name: Copy firmware
        run: |
          mkdir -p release
          cp .pio/build/${{ inputs.environment }}/firmware.bin \
             release/${{ inputs.environment }}.bin

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: custom-${{ inputs.environment }}-${{ github.run_number }}
          path: release/*.bin