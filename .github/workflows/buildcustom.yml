name: Build Custom Firmware

on:
  workflow_dispatch:
    inputs:

      environment:
        description: "Environment"
        required: true
        default: GUI_Generic_ESP32
        type: choice
        options:
          - GUI_Generic_4MB_ESP8266
          - GUI_Generic_ESP32
          - GUI_Generic_ESP32C3
          - GUI_Generic_ESP32S2
          - GUI_Generic_ESP32S3

name: Build Custom Firmware

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        default: GUI_Generic_ESP32
        type: choice
        options:
          - GUI_Generic_4MB_ESP8266
          - GUI_Generic_ESP32
          - GUI_Generic_ESP32C3
          - GUI_Generic_ESP32S2
          - GUI_Generic_ESP32S3
      SUPLA_RELAY:
